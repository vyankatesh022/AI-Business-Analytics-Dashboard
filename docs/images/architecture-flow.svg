<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 100" width="800" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="border1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="border2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="border3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="border4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="100" rx="16" fill="url(#bgGrad)" stroke="#334155" stroke-width="1"/>

  <!-- Box 1: Frontend -->
  <g transform="translate(20, 20)">
    <rect width="160" height="60" rx="8" fill="#0f172a" stroke="url(#border1)" stroke-width="2"/>
    <text x="80" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="bold" fill="#60a5fa" text-anchor="middle">🖥️ Client Layer</text>
    <text x="80" y="44" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#cbd5e1" text-anchor="middle">Next.js 15 / React 19</text>
  </g>

  <!-- Arrow 1 -->
  <path d="M 188 50 L 212 50" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <circle cx="200" cy="50" r="3" fill="#3b82f6"/>

  <!-- Box 2: Gateway & API -->
  <g transform="translate(220, 20)">
    <rect width="160" height="60" rx="8" fill="#0f172a" stroke="url(#border2)" stroke-width="2"/>
    <text x="80" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="bold" fill="#34d399" text-anchor="middle">⚙️ API Gateway</text>
    <text x="80" y="44" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#cbd5e1" text-anchor="middle">FastAPI • Python 3.12</text>
  </g>

  <!-- Arrow 2 -->
  <path d="M 388 50 L 412 50" stroke="#64748b" stroke-width="2"/>
  <circle cx="400" cy="50" r="3" fill="#10b981"/>

  <!-- Box 3: Data & Security -->
  <g transform="translate(420, 20)">
    <rect width="160" height="60" rx="8" fill="#0f172a" stroke="url(#border3)" stroke-width="2"/>
    <text x="80" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="bold" fill="#a78bfa" text-anchor="middle">🗄️ Data &amp; RLS</text>
    <text x="80" y="44" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#cbd5e1" text-anchor="middle">PostgreSQL • Redis</text>
  </g>

  <!-- Arrow 3 -->
  <path d="M 588 50 L 612 50" stroke="#64748b" stroke-width="2"/>
  <circle cx="600" cy="50" r="3" fill="#8b5cf6"/>

  <!-- Box 4: AI & ML Engine -->
  <g transform="translate(620, 20)">
    <rect width="160" height="60" rx="8" fill="#0f172a" stroke="url(#border4)" stroke-width="2"/>
    <text x="80" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="bold" fill="#fbbf24" text-anchor="middle">🧠 AI Copilot</text>
    <text x="80" y="44" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#cbd5e1" text-anchor="middle">SageMaker • OpenAI</text>
  </g>
</svg>
